schema_version: 1

context:
  name: dirtyjson
  version: 1.0.8

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/dirtyjson-${{ version }}.tar.gz
  sha256: 90ca4a18f3ff30ce849d100dcf4a003953c79d3a2348ef056f1d9c22231a25fd

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - dirtyjson
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: JSON decoder for Python that can extract data from the muck
  license: Apache-2.0
  license_file: LICENSE.txt
  homepage: https://github.com/codecobblers/dirtyjson

extra:
  recipe-maintainers:
    - pavelzw
